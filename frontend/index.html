<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mental Health Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-container {
      width: 400px;
      height: 550px;
      background: white;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .chat-header {
      padding: 15px;
      background: #6c63ff;
      color: white;
      text-align: center;
      font-weight: bold;
    }
    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }
    .user {
      text-align: right;
      margin: 5px;
      color: #333;
    }
    .bot {
      text-align: left;
      margin: 5px;
      color: #6c63ff;
    }
    .input-box {
      display: flex;
      border-top: 1px solid #ddd;
    }
    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }
    button {
      padding: 10px;
      background: #6c63ff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button {
        pointer-events: auto;
        z-index: 10;
    }

  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">🧠 Mental Health Chatbot</div>
  <div class="chat-box" id="chat-box"></div>
  <div class="input-box">
    <input id="user-input" placeholder="Type your message..." />
    <button id="send-btn">Send</button>
  </div>
</div>

<script src="static/script.js" defer></script>

</body>
</html>
